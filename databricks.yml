bundle:
  name: data-engineering-project

include:
  - resources/*.yml

variables:
  catalog_name:
    description: Target Unity Catalog catalog name
    default: dev_catalog
  schema_name:
    description: Target schema/database name
    default: customer_pipeline
  run_date:
    description: Pipeline run date used by local and Databricks jobs
    default: 2026-06-23

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://example-dev-workspace.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: dev_catalog
      schema_name: customer_pipeline_dev

  prod:
    mode: production
    workspace:
      host: https://example-prod-workspace.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: prod_catalog
      schema_name: customer_pipeline_prod

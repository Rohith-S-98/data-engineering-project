name: V27 E2E Integration CI

on:
  push:
    branches:
      - main
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  v27-e2e-integration:
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V27 E2E integration smoke gates
        run: |
          python -m scripts.run_e2e_integration_tests --mode smoke --run-date 2026-06-23

      - name: Run V27 framework tests
        run: |
          python -m unittest tests.test_v27_e2e_integration_framework

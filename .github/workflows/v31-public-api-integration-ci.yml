name: V31 Public API Integration CI

on:
  push:
    branches:
      - main
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  v31-public-api-integration:
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate public API registry
        run: |
          python -m scripts.validate_public_api_registry

      - name: Run mocked public API integration
        run: |
          python -m scripts.live_public_api_integration

      - name: Run V31 targeted tests
        run: |
          python -m unittest tests.test_v31_public_api_integration

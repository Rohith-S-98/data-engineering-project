name: Python CI

on:
  push:
    branches:
      - main
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          python -m scripts.validate_python_project

  config-validation:
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate config files
        run: |
          python -m scripts.validate_config_files

  repository-hygiene:
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository hygiene
        run: |
          python -m scripts.validate_repo_hygiene

  artifact-validation:
    runs-on: ubuntu-latest
    needs:
      - python-syntax
      - config-validation
      - repository-hygiene
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Docker artifacts
        run: |
          python -m scripts.validate_docker_artifacts

      - name: Validate Databricks bundle structure
        run: |
          python -m scripts.validate_databricks_bundle_structure

      - name: Validate ADF artifacts
        run: |
          python -m scripts.validate_adf_artifacts

      - name: Validate Power BI dashboard artifacts
        run: |
          python -m scripts.validate_powerbi_dashboard_artifacts

  targeted-tests:
    runs-on: ubuntu-latest
    needs:
      - artifact-validation
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run targeted release tests
        run: |
          python -m unittest tests.test_pipeline_retry
          python -m unittest tests.test_v17_orchestrator_retry
          python -m unittest tests.test_v18_quality_gates
          python -m unittest tests.test_v19_docker_artifacts
          python -m unittest tests.test_v20_api_ingestion
          python -m unittest tests.test_v21_database_ingestion
          python -m unittest tests.test_v22_advanced_dq_rule_catalog
          python -m unittest tests.test_v23_databricks_bundle_structure
          python -m unittest tests.test_v23_0_1_repo_hygiene
          python -m unittest tests.test_v24_adf_artifacts
          python -m unittest tests.test_v25_powerbi_observability_dashboard

  full-tests:
    runs-on: ubuntu-latest
    needs:
      - targeted-tests
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite
        run: |
          python -m unittest discover tests

  dry-run-orchestrator:
    runs-on: ubuntu-latest
    needs:
      - full-tests
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dry-run orchestrator
        run: |
          python -m scripts.pipeline_orchestrator --dry-run --run-date 2026-06-23

  runtime-cleanliness:
    runs-on: ubuntu-latest
    needs:
      - dry-run-orchestrator
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate runtime-output cleanliness
        run: |
          python -m scripts.validate_runtime_cleanliness

name: V26 Secret Environment CI

on:
  push:
    branches:
      - main
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  v26-secret-environment:
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::ResourceWarning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate secret environment config
        run: |
          python -m scripts.validate_secret_environment_config

      - name: Run V26 targeted tests
        run: |
          python -m unittest tests.test_v26_secret_environment_config
